<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details — Daniel Casadevall</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --white: #fdfdfb;
            --ink: #16181c;
            --blue: #3b5bdb;
            --blue-dark: #1f2a52;
            --line: #e7e7e2;
            --paper: #f6f6f2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--white);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
        }

        /* ---------- HEADER ---------- */
        .detail-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 2.5rem;
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            background: rgba(253, 253, 251, .9);
            backdrop-filter: blur(8px);
            z-index: 20;
        }

        .btn-close {
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--black);
            border: 1px solid var(--black);
            padding: 6px 12px;
            transition: background 0.15s, color 0.15s;
            cursor: pointer;
            background: transparent;
            max-width: 100px;
        }

        .btn-close:hover {
            background: #1a1a1a;
            color: var(--white);
        }

        /*
        .btn-close {
            justify-self: start;
            text-decoration: none;
            color: var(--blue-dark);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: .08em;
            text-transform: uppercase;
            border: 1px solid var(--line);
            padding: .6rem 1.1rem;
            border-radius: 0px;
            transition: all .2s ease;
            white-space: nowrap;
        }

        .btn-close:hover {
            border-color: var(--blue);
            color: var(--blue);
            transform: translateX(-2px);
        } */

        .header-center {
            grid-column: 2;
            text-align: center;
        }

        .header-spacer {
            justify-self: end;
            width: 1px;
        }

        .eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 6px;
        }

        h1.title {
            font-family: 'Bebas Neue', sans-serif;
            font-weight: 400;
            font-size: clamp(1.6rem, 3vw, 2.4rem);
            letter-spacing: .02em;
            margin: 0;
            color: var(--blue-dark);
            line-height: 1.05;
        }

        .subtitle {
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            font-size: .95rem;
            color: #6b6f76;
            margin-top: 4px;
        }

        /* ---------- BODY LAYOUT ---------- */
        .detail-body {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 3rem;
            max-width: 1280px;
            margin: 0 auto;
            padding: 3rem 2.5rem 6rem;
        }

        @media (max-width:880px) {
            .detail-body {
                grid-template-columns: 1fr;
                padding: 2rem 1.25rem 4rem;
            }

            .detail-header {
                padding: 1rem 1.25rem;
            }
        }

        /* ---------- NATURAL MEDIA FLOW ---------- */
        .detail-main {
            min-width: 0;
        }

        .hero-media {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1.25rem;
            background: var(--paper);
        }

        .hero-media img,
        .hero-media video {
            width: 100%;
            height: auto;
            display: block;
        }

        .media-columns {
            column-count: 2;
            column-gap: 1.25rem;
        }

        @media (max-width:600px) {
            .media-columns {
                column-count: 1;
            }
        }

        .media-item {
            break-inside: avoid;
            margin-bottom: 1.25rem;
            border-radius: 2px;
            overflow: hidden;
            background: var(--paper);
            position: relative;
        }

        .media-item img,
        .media-item video {
            width: 100%;
            height: auto;
            display: block;
            transition: transform .35s ease;
        }

        .media-item.clickable {
            cursor: zoom-in;
        }

        .media-item.clickable:hover img {
            transform: scale(1.025);
        }

        .media-ph {
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ph-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: var(--blue);
            opacity: .25;
        }

        .ph-type {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: .1em;
            color: var(--blue-dark);
            opacity: .5;
            text-transform: uppercase;
            display: block;
            text-align: center;
            margin-top: 4px;
        }

        /* ---------- SIDEBAR ---------- */
        .detail-sidebar {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .sidebar-block {
            padding-bottom: 1.75rem;
            border-bottom: 1px solid var(--line);
        }

        .sidebar-block:last-child {
            border-bottom: none;
        }

        .sidebar-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: .75rem;
        }

        .detail-description,
        #detail-outcome {
            font-size: .95rem;
            line-height: 1.65;
            color: #34373d;
            max-width: 65ch;
        }

        .stack-list {
            display: flex;
            flex-wrap: wrap;
            gap: .5rem;
        }

        .tag {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            padding: .35rem .7rem;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--blue-dark);
            background: var(--paper);
        }

        .links-row {
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
        }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            text-decoration: none;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: .04em;
            color: var(--blue-dark);
            border: 1px solid var(--blue-dark);
            padding: .55rem 1rem;
            border-radius: 6px;
            transition: all .2s ease;
        }

        .btn-ghost:hover {
            background: var(--blue-dark);
            color: var(--white);
        }

        /* ---------- LIGHTBOX ---------- */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 11, 14, .94);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox-content-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: zoom-in;
        }

        .lightbox-content-wrapper.zoomed {
            cursor: grab;
        }

        .lightbox-content-wrapper.zoomed.dragging {
            cursor: grabbing;
        }

        .lightbox-content {
            max-width: 92vw;
            max-height: 88vh;
            object-fit: contain;
            transition: transform .25s ease;
            user-select: none;
            -webkit-user-drag: none;
        }

        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            font-family: 'DM Mono', monospace;
            line-height: 1;
            z-index: 1001;
            opacity: .8;
            transition: opacity .2s;
        }

        .lightbox-close:hover {
            opacity: 1;
        }

        .lightbox-hint {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .55);
        }
    </style>

</head>

<body>
    <div class="project-detail" id="detail-overlay">
        <div class="detail-header">
            <a href="index.html" class="btn-close">← Back</a>
            <div class="header-center">
                <div class="eyebrow" id="detail-year"></div>
                <h1 class="title" id="detail-title">Loading…</h1>
                <div class="subtitle" id="detail-subtitle"></div>
            </div>
            <div class="header-spacer"></div>
        </div>

        <div class="detail-body">
            <div class="detail-main">
                <div class="hero-media" id="detail-hero"></div>
                <div class="media-columns" id="detail-images"></div>
            </div>

            <div class="detail-sidebar">
                <div class="sidebar-block">
                    <div class="sidebar-label">Description</div>
                    <div class="detail-description" id="detail-desc"></div>
                </div>
                <div class="sidebar-block">
                    <div class="sidebar-label">Stack</div>
                    <div id="detail-stack" class="stack-list"></div>
                </div>
                <div class="sidebar-block">
                    <div class="sidebar-label">Outcome</div>
                    <p id="detail-outcome"></p>
                </div>
                <div class="sidebar-block" id="detail-links-block">
                    <div class="sidebar-label">Links</div>
                    <div id="detail-links" class="links-row"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox-modal" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <div class="lightbox-content-wrapper" id="lightbox-wrapper">
            <img class="lightbox-content" id="lightbox-img" src="" alt="">
        </div>
        <div class="lightbox-hint">Click to zoom · drag to pan · Esc to close</div>
    </div>

    <script src="js/info.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const projectId = params.get('id');
        const p = (typeof PROJECTS !== 'undefined') ? PROJECTS.find(proj => proj.id === projectId) : null;

        if (p) {
            document.title = p.title + ' — Daniel Casadevall';
            document.getElementById('detail-title').textContent = p.title;
            document.getElementById('detail-subtitle').textContent = p.subtitle || '';
            document.getElementById('detail-year').textContent = p.year || '';
            document.getElementById('detail-desc').innerHTML = p.fullDesc || '';
            document.getElementById('detail-outcome').textContent = p.outcome || '';

            document.getElementById('detail-stack').innerHTML =
                (p.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

            const hero = document.getElementById('detail-hero');
            const grid = document.getElementById('detail-images');

            const sortedMedia = p.media ? [
                ...p.media.filter(m => m.type === 'video'),
                ...p.media.filter(m => m.type === 'image')
            ] : [];

            const renderPlaceholder = (n, type) => `
    <div class="media-ph">
      <div>
        <div class="ph-num">${String(n).padStart(2, '0')}</div>
        <span class="ph-type">${type}</span>
      </div>
    </div>`;

            if (sortedMedia.length > 0) {
                const m0 = sortedMedia[0];
                hero.innerHTML = m0.src
                    ? (m0.type === 'video'
                        ? `<video src="${m0.src}" controls playsinline autoplay loop muted></video>`
                        : `<img src="${m0.src}" alt="${p.title} 1">`)
                    : renderPlaceholder(1, m0.type);

                grid.innerHTML = sortedMedia.slice(1).map((m, j) => {
                    const n = j + 2;
                    if (!m.src) {
                        return `<div class="media-item">${renderPlaceholder(n, m.type)}</div>`;
                    }
                    if (m.type === 'video') {
                        return `<div class="media-item"><video src="${m.src}" muted playsinline autoplay loop></video></div>`;
                    }
                    return `<div class="media-item clickable"><img src="${m.src}" alt="${p.title} ${n}"></div>`;
                }).join('');
            }

            // Links
            const links = document.getElementById('detail-links');
            let linkElements = [];
            if (p.links && p.links.length > 0) {
                p.links.forEach(link => {
                    const label = link.label || (link.github ? 'GitHub' : 'Link');
                    const url = link.url || link.github || '#';
                    linkElements.push(`<a href="${url}" target="_blank" class="btn-ghost">${label} ↗</a>`);
                });
            }
            const linkTypes = [
                { key: 'github', label: 'GitHub' },
                { key: 'youtube', label: 'YouTube' },
                { key: 'paper', label: 'Paper' },
                { key: 'vimeo', label: 'Vimeo' },
                { key: 'website', label: 'Website' }
            ];
            linkTypes.forEach(type => {
                if (p[type.key]) {
                    linkElements.push(`<a href="${p[type.key]}" target="_blank" class="btn-ghost">${type.label} ↗</a>`);
                }
            });
            links.innerHTML = linkElements.join('');
            if (linkElements.length === 0) {
                document.getElementById('detail-links-block').style.display = 'none';
            }

            // ---------- LIGHTBOX with zoom & pan ----------
            const lightbox = document.getElementById('lightbox-modal');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxWrapper = document.getElementById('lightbox-wrapper');

            let scale = 1, originX = 0, originY = 0;
            let isDragging = false, startX = 0, startY = 0;

            function resetZoom() {
                scale = 1; originX = 0; originY = 0;
                lightboxImg.style.transform = 'translate(0px,0px) scale(1)';
                lightboxWrapper.classList.remove('zoomed');
            }

            function applyTransform() {
                lightboxImg.style.transform = `translate(${originX}px, ${originY}px) scale(${scale})`;
            }

            const mediaImages = [...hero.querySelectorAll('img'), ...grid.querySelectorAll('img')];

            mediaImages.forEach(imgEl => {
                imgEl.style.cursor = 'zoom-in';
                imgEl.addEventListener('click', () => {
                    lightboxImg.src = imgEl.src;
                    lightboxImg.alt = imgEl.alt;
                    resetZoom();
                    lightbox.classList.add('open');
                    document.body.style.overflow = 'hidden';
                });
            });

            function closeLightbox() {
                lightbox.classList.remove('open');
                resetZoom();
                document.body.style.overflow = '';
            }

            document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);

            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
            });

            lightboxWrapper.addEventListener('click', (e) => {
                if (isDragging) return;
                if (scale === 1) {
                    scale = 2.2;
                    lightboxWrapper.classList.add('zoomed');
                } else {
                    resetZoom();
                }
                applyTransform();
            });

            lightboxWrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY < 0 ? 0.15 : -0.15;
                scale = Math.min(4, Math.max(1, scale + delta));
                if (scale === 1) { originX = 0; originY = 0; lightboxWrapper.classList.remove('zoomed'); }
                else { lightboxWrapper.classList.add('zoomed'); }
                applyTransform();
            }, { passive: false });

            lightboxWrapper.addEventListener('mousedown', (e) => {
                if (scale === 1) return;
                isDragging = true;
                lightboxWrapper.classList.add('dragging');
                startX = e.clientX - originX;
                startY = e.clientY - originY;
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                originX = e.clientX - startX;
                originY = e.clientY - startY;
                applyTransform();
            });
            window.addEventListener('mouseup', () => {
                isDragging = false;
                lightboxWrapper.classList.remove('dragging');
            });

        } else {
            document.getElementById('detail-title').textContent = "Project not found";
            document.getElementById('detail-desc').innerHTML = "<p>Please return to the home page and select a valid project.</p>";
        }
    </script>
</body>

</html>
